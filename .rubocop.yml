plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "a.rb"
    - "vendor/**/*"
    - "bin/benchmark"
    - "bin/profile"
    - "tmp/**/*"
    - "sample/**/*"
    - "bench_*.rb"
    - "experiment/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/AccessModifierDeclarations:
  EnforcedStyle: inline

Naming/FileName:
  Enabled: false

# process_gem etc. return boolean as side-effect indicator, not as predicate
Naming/PredicateMethod:
  Enabled: false

Layout/LineLength:
  Max: 160

Lint/DuplicateBranch:
  Enabled: false

Style/NegatedIf:
  Enabled: false

# bin/ scripts don't need top-level documentation
Style/Documentation:
  Exclude:
    - "bin/**/*"

# LiteralNode.values is an Array, not a Hash
Style/HashEachMethods:
  Enabled: false

# Disable all Metrics cops
Metrics:
  Enabled: false

# RSpec cops configuration
RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/NestedGroups:
  Max: 4

RSpec/DescribeClass:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/PendingWithoutReason:
  Enabled: false
